<!DOCTYPE html>
<html lang="en" id="root" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBG · Project Monitoring Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══ TOKENS — Dark ═══ */
[data-theme="dark"] {
  --bg:             #020C17;
  --surface:        #051728;
  --surface-raised: #08213A;
  --surface-hover:  #0B2B4C;
  --border:         rgba(255,255,255,0.07);
  --border-strong:  rgba(255,255,255,0.14);
  --text-1:         #FFFFFF;
  --text-2:         #A2BCBC;
  --text-3:         #789898;
  --text-dis:       #375252;
  --accent:         #5DADE2;
  --accent-sub:     rgba(93,173,226,0.13);
  --on-accent:      #012740;
  --pos:            #69DB7C;
  --pos-sub:        rgba(105,219,124,0.12);
  --neg:            #FF6B6B;
  --neg-sub:        rgba(255,107,107,0.12);
  --warn:           #FFD54F;
  --warn-sub:       rgba(255,213,79,0.12);
  --info:           #40C4FF;
  --info-sub:       rgba(64,196,255,0.12);
  --shadow:         0 2px 20px rgba(0,0,0,0.5);
  --shadow-lg:      0 8px 40px rgba(0,0,0,0.7);
  color-scheme: dark;
}
/* ═══ TOKENS — Light ═══ */
[data-theme="light"] {
  --bg:             #F5F5F5;
  --surface:        #FFFFFF;
  --surface-raised: #EFEFEF;
  --surface-hover:  #E4E4E4;
  --border:         rgba(0,0,0,0.07);
  --border-strong:  rgba(0,0,0,0.13);
  --text-1:         #011314;
  --text-2:         #375252;
  --text-3:         #527474;
  --text-dis:       #A2BCBC;
  --accent:         #012740;
  --accent-sub:     rgba(1,39,64,0.10);
  --on-accent:      #FFFFFF;
  --pos:            #2D7A3A;
  --pos-sub:        rgba(45,122,58,0.1);
  --neg:            #B71C1C;
  --neg-sub:        rgba(183,28,28,0.1);
  --warn:           #8B6914;
  --warn-sub:       rgba(139,105,20,0.1);
  --info:           #0277BD;
  --info-sub:       rgba(2,119,189,0.1);
  --shadow:         0 2px 20px rgba(0,0,0,0.08);
  --shadow-lg:      0 8px 40px rgba(0,0,0,0.12);
  color-scheme: light;
}
/* Theme-aware date/select inputs */
[data-theme="dark"] input[type="date"],
[data-theme="dark"] select { color-scheme: dark; }
[data-theme="light"] input[type="date"],
[data-theme="light"] select { color-scheme: light; }
[data-theme="dark"] select option  { background: #062424; color: #fff; }
[data-theme="light"] select option { background: #fff; color: #011314; }

/* ═══ RESET ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;height:100%;}
body{
  background:var(--bg);color:var(--text-1);
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  line-height:1.5;height:100%;overflow:hidden;
  transition:background .35s,color .35s;
}
button,select,input{font-family:inherit;font-size:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}

/* ═══ LAYOUT ═══ */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{
  height:52px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 80px;gap:12px;
  position:relative;z-index:100;
  transition:background .35s,border-color .35s;
}
.filter-strip{
  height:46px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 80px;gap:8px;
  position:relative;z-index:90;
  transition:background .35s,border-color .35s;
}
.breadcrumb{
  height:36px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:none;align-items:center;padding:0 80px;gap:6px;
  font-size:12px;color:var(--text-3);
  transition:background .35s;
}
.breadcrumb.on{display:flex;}
.bc-link{cursor:pointer;transition:color .15s;}
.bc-link:hover{color:var(--accent);}
.bc-cur{color:var(--text-1);}
.body{display:flex;flex:1;overflow:hidden;}

/* ═══ HEADER ELEMENTS ═══ */
.brand{font-size:17px;font-weight:800;letter-spacing:-.03em;color:var(--accent);flex-shrink:0;}
.live-pip{
  width:7px;height:7px;border-radius:50%;
  background:var(--pos);flex-shrink:0;
  animation:livePulse 2.5s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(105,219,124,.5);}
  60%{box-shadow:0 0 0 6px rgba(105,219,124,0);}
}
.hspacer{flex:1;}
.hrow{display:flex;align-items:center;gap:8px;}

/* Primary button */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:32px;padding:0 13px;border-radius:8px;
  border:1px solid var(--border-strong);background:var(--surface-raised);
  color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;
  white-space:nowrap;
  transition:background .18s,color .18s,border-color .18s,box-shadow .18s;
}
.btn:hover{background:var(--surface-hover);color:var(--text-1);}
.btn-accent{background:var(--accent);border-color:transparent;color:var(--on-accent);}
.btn-accent:hover{opacity:.88;box-shadow:0 2px 12px rgba(180,255,84,.25);}

/* Tertiary button — ghost, text-only */
.btn-tertiary{
  display:inline-flex;align-items:center;gap:5px;
  height:30px;padding:0 10px;border-radius:8px;
  border:none;background:transparent;
  color:var(--text-3);font-size:12px;font-weight:500;cursor:pointer;
  white-space:nowrap;
  transition:background .15s,color .15s;
}
.btn-tertiary:hover{background:var(--surface-raised);color:var(--text-2);}

.date-ctl{
  height:32px;padding:0 10px;
  background:var(--surface-raised);border:1px solid var(--border-strong);
  border-radius:8px;color:var(--text-2);font-size:12px;cursor:pointer;
  outline:none;transition:border-color .15s,color .15s,background .35s;
}
.date-ctl:hover,.date-ctl:focus{border-color:var(--accent);color:var(--text-1);}
.date-sep{font-size:11px;color:var(--text-dis);}
.theme-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--surface-raised);border:1px solid var(--border-strong);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .3s,border-color .35s;
}

.theme-btn:hover{background:var(--surface-hover);transform:rotate(22deg);}

.user-name{font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap;}

/* ═══ FILTER STRIP ═══ */
.fsel{
  height:30px;padding:0 26px 0 10px;appearance:none;
  background:var(--surface-raised)
    url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23789898' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E")
    no-repeat right 8px center;
  border:1px solid var(--border-strong);border-radius:8px;
  color:var(--text-2);font-size:12px;cursor:pointer;outline:none;
  transition:border-color .15s,color .15s,background .35s;
}
.fsel:hover,.fsel:focus{border-color:var(--accent);color:var(--text-1);}
.filter-count{font-size:11px;color:var(--accent);margin-left:2px;font-weight:500;}
/* ═══ CUSTOM MULTISELECT ═══ */
.fmulti{position:relative;}
.fmulti-btn{
  height:30px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;
  background:var(--surface-raised);border:1px solid var(--border-strong);
  border-radius:8px;color:var(--text-2);font-size:12px;cursor:pointer;
  white-space:nowrap;outline:none;flex-shrink:0;
  transition:border-color .15s,color .15s,background .35s;
}
.fmulti-btn:hover,.fmulti-btn.open{border-color:var(--accent);color:var(--text-1);}
.fmulti-btn.has-sel{border-color:var(--accent);color:var(--accent);}
.fmulti-chevron{flex-shrink:0;transition:transform .2s cubic-bezier(.4,0,.2,1);}
.fmulti-btn.open .fmulti-chevron{transform:rotate(180deg);}
.fmulti-panel{
  position:absolute;top:calc(100% + 5px);left:0;z-index:500;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:10px;min-width:168px;max-height:240px;overflow-y:auto;
  box-shadow:var(--shadow-lg);padding:4px;
  display:none;flex-direction:column;gap:1px;
}
.fmulti-panel.open{display:flex;animation:fadeUp .15s cubic-bezier(0,0,.2,1);}
.fmulti-opt{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:6px;cursor:pointer;
  font-size:12px;color:var(--text-2);user-select:none;
  transition:background .1s,color .1s;
}
.fmulti-opt:hover{background:var(--surface-raised);color:var(--text-1);}
.fmulti-opt input[type="checkbox"]{width:13px;height:13px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.fmulti-badge{
  background:var(--accent);color:var(--on-accent);
  border-radius:999px;padding:0 5px;font-size:10px;font-weight:700;line-height:16px;
}

/* ═══ LEFT PANEL ═══ */
.sidebar{
  width:431px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  padding-left:80px;
  transition:width .3s cubic-bezier(.4,0,.2,1),background .35s,border-color .35s;
}
.tab-row{
  display:flex;gap:3px;padding:10px 10px 0 0;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.tab-btn{
  flex:1;height:34px;border-radius:8px 8px 0 0;border:none;
  cursor:pointer;font-size:12px;font-weight:600;
  background:transparent;transition:all .18s;
}
.tab-btn.crit{color:var(--neg);}
.tab-btn.crit.on{background:var(--neg-sub);}
.tab-btn.upco{color:var(--text-3);}
.tab-btn.upco.on{background:var(--accent-sub);color:var(--accent);}
.panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 6px 0;flex-shrink:0;
}
.panel-hdr h4{font-size:12px;font-weight:600;color:var(--text-2);}
.icon-btn{
  background:none;border:none;cursor:pointer;color:var(--text-3);
  padding:3px;border-radius:4px;line-height:1;
  transition:color .15s,background .15s;
}
.icon-btn:hover{color:var(--text-1);background:var(--surface-raised);}
.cards-list{
  flex:1;overflow-y:auto;padding:6px 10px 6px 0;
  display:flex;flex-direction:column;gap:8px;
}
/* critical card */
.ccard{
  background:var(--surface-raised);border:1px solid var(--border);
  border-radius:12px;padding:11px;display:flex;gap:9px;
  cursor:pointer;
  opacity:0;transform:translateX(-12px);
  animation:slideL .28s cubic-bezier(0,0,.2,1) forwards;
  transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;
}
.ccard:hover{background:var(--surface-hover);border-color:var(--border-strong);transform:translateX(2px);box-shadow:var(--shadow);}
.ccard:nth-child(1){animation-delay:.04s;}.ccard:nth-child(2){animation-delay:.09s;}
.ccard:nth-child(3){animation-delay:.14s;}.ccard:nth-child(4){animation-delay:.19s;}
@keyframes slideL{to{opacity:1;transform:translateX(0);}}
.cbody{flex:1;min-width:0;}
.cbadge{
  display:inline-flex;align-items:center;height:17px;padding:0 6px;
  border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:5px;
}
.bp{background:var(--info-sub);color:var(--info);}
.bc{background:var(--pos-sub);color:var(--pos);}
.ctitle{font-size:12px;font-weight:600;color:var(--text-1);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmeta{font-size:10px;color:var(--text-3);margin-bottom:1px;}
.cmeta-lead{font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:5px;margin-top:3px;}
.creason{font-size:10px;color:var(--text-3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:3px;}
/* days left badge */
.daysbadge{
  flex-shrink:0;width:50px;border-radius:10px;padding:6px 4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:background .18s,border-color .18s;
}
.daysbadge.red{background:var(--neg-sub);border:1px solid var(--neg);}
.daysbadge.amber{background:var(--warn-sub);border:1px solid var(--warn);}
.dnum{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.1;}
.daysbadge.red .dnum{color:var(--neg);}
.daysbadge.amber .dnum{color:var(--warn);}
.dlbl{font-size:8px;letter-spacing:.03em;padding:2px 0 0;text-align:center;}
.daysbadge.red .dlbl{color:var(--neg);}
.daysbadge.amber .dlbl{color:var(--warn);}
/* AI button */
.ai-btn{
  margin:6px 10px 10px 0;height:42px;flex-shrink:0;
  background:var(--accent-sub);border:1px solid var(--accent);border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--accent);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.ai-btn:hover{background:var(--accent);color:var(--on-accent);box-shadow:0 4px 24px rgba(93,173,226,.25);}
.ai-sparkle-ic{flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.ai-btn:hover .ai-sparkle-ic{transform:scale(1.18) rotate(15deg);}

/* ═══ MAIN AREA ═══ */
.main{flex:1;overflow-y:auto;padding:18px 80px;display:flex;flex-direction:column;gap:16px;}

/* ═══ KPI GRID ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.kcard{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:15px;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:8px;
  opacity:0;transform:translateY(14px);
  animation:fadeUp .4s cubic-bezier(0,0,.2,1) forwards;
  transition:background .2s,border-color .2s,box-shadow .2s,transform .2s;
}
.kcard:hover{background:var(--surface-raised);border-color:var(--border-strong);box-shadow:var(--shadow);transform:translateY(-2px);}
.kcard.selected{border-color:var(--accent);}
.kcard.selected::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);border-radius:14px 14px 0 0;}
.kcard:nth-child(1){animation-delay:.06s;}.kcard:nth-child(2){animation-delay:.10s;}
.kcard:nth-child(3){animation-delay:.14s;}.kcard:nth-child(4){animation-delay:.18s;}
.kcard:nth-child(5){animation-delay:.22s;}.kcard:nth-child(6){animation-delay:.26s;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* KPI card layout: label top, then [value-left | chart-right] */
.kcard-top{display:flex;align-items:flex-start;}
.klabel{font-size:11.5px;font-weight:500;color:var(--text-2);}
.kcard-body{display:flex;align-items:center;gap:12px;margin-top:2px;}
.kval-wrap{flex-shrink:0;min-width:76px;}
.knum{
  font-family:'DM Mono',monospace;font-size:32px;font-weight:500;
  line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;
}
.knum.pos{color:var(--pos);}
.knum.neg{color:var(--neg);}
.knum.warn{color:var(--warn);}
.knum.neu{color:var(--text-1);}
.ktrend{display:flex;align-items:center;gap:3px;font-size:11px;margin-top:4px;}
.karrow{font-size:12px;font-weight:700;line-height:1;}
.karrow.up{color:var(--pos);}.karrow.down{color:var(--neg);}
.karrow.wu{color:var(--warn);}.karrow.nu{color:var(--text-3);}
.kdelta{color:var(--text-3);}
.ktarget{font-size:10px;color:var(--text-dis);margin-top:2px;}
.kchart{flex:1;height:72px;position:relative;min-width:0;}
.kchart canvas{width:100%!important;height:100%!important;}
/* flash animation for live updates */
@keyframes flashNum{0%,100%{opacity:1;}35%{opacity:.15;}}
.knum.flash{animation:flashNum .55s cubic-bezier(.4,0,.2,1);}
/* refresh animation */
@keyframes kpiOut{to{opacity:0;transform:translateY(-8px) scale(.97);}}
.kcard.kpi-out{animation:kpiOut .2s cubic-bezier(.4,0,1,1) forwards!important;}

/* avatar */
.avatar{
  width:24px;height:24px;border-radius:50%;object-fit:cover;
  border:1.5px solid var(--border-strong);flex-shrink:0;
  background:var(--surface-raised);
  transition:border-color .15s;
}
.avatar-lg{width:30px;height:30px;}

/* ═══ PORTFOLIO TABLE ═══ */
.section{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;flex:1;min-height:280px;
  transition:background .35s,border-color .35s;
}
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sec-title{font-size:14px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:8px;}
.cnt-badge{
  background:var(--accent-sub);color:var(--accent);
  border-radius:999px;padding:1px 8px;
  font-size:10px;font-weight:700;font-family:'DM Mono',monospace;
}
.sec-actions{display:flex;align-items:center;gap:7px;}
.search-in{
  height:30px;padding:0 10px;background:var(--surface-raised);
  border:1px solid var(--border-strong);border-radius:8px;
  color:var(--text-1);font-size:12px;outline:none;width:170px;
  transition:border-color .15s,width .2s,background .35s;
}
.search-in::placeholder{color:var(--text-3);}
.search-in:focus{border-color:var(--accent);width:210px;}
.table-wrap{overflow:auto;flex:1;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  padding:9px 15px;text-align:left;font-size:10.5px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);
  background:var(--surface-raised);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:1;white-space:nowrap;cursor:pointer;user-select:none;
  transition:color .15s,background .35s;
}
thead th:hover{color:var(--text-1);}
thead th .si{margin-left:4px;opacity:.35;font-style:normal;}
thead th.sa .si,thead th.sd .si{opacity:1;color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:hover{background:var(--surface-raised);}
tbody tr:last-child{border-bottom:none;}
tbody tr.sel{background:var(--accent-sub);}
td{padding:10px 15px;color:var(--text-1);}
.tdn{font-weight:500;}
.tdc{color:var(--text-2);font-size:11.5px;}
.tdl-cell{display:flex;align-items:center;gap:7px;color:var(--text-2);}
.tdd{color:var(--text-2);font-size:11px;white-space:nowrap;}
.tdn-notes{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--text-3);}
/* chips */
.chip{display:inline-flex;align-items:center;height:21px;padding:0 8px;border-radius:999px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.chip.on-track{background:var(--pos-sub);color:var(--pos);}
.chip.at-risk{background:var(--neg-sub);color:var(--neg);}
.chip.overdue{background:var(--neg-sub);color:var(--neg);border:1px solid var(--neg);}
.chip.paused{background:var(--warn-sub);color:var(--warn);}
.chip.completed{background:var(--info-sub);color:var(--info);}
/* progress */
.prog-cell{display:flex;align-items:center;gap:7px;min-width:110px;}
.prog-track{flex:1;height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;width:0%;transition:width 1.1s cubic-bezier(0,0,.2,1);}
.prog-fill.on-track{background:var(--pos);}
.prog-fill.at-risk,.prog-fill.overdue{background:var(--neg);}
.prog-fill.paused{background:var(--warn);}
.prog-fill.completed{background:var(--info);}
.prog-pct{font-size:10.5px;color:var(--text-3);font-family:'DM Mono',monospace;width:26px;text-align:right;flex-shrink:0;}
/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:6px;color:var(--text-3);font-size:13px;}

/* ═══ DETAIL VIEW ═══ */
.detail-view{display:none;flex-direction:column;gap:14px;}
.detail-view.on{display:flex;animation:fadeUp .25s cubic-bezier(0,0,.2,1);}
.dhdr{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:background .35s;}
.dtitle{font-size:17px;font-weight:700;margin-bottom:3px;}
.dsubtitle{font-size:12px;color:var(--text-3);}
.dmeta-row{display:flex;flex-wrap:wrap;gap:18px;margin-top:13px;}
.dmi{display:flex;flex-direction:column;gap:2px;}
.dmlbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);}
.dmval{font-size:13px;font-weight:500;color:var(--text-1);}
.dprog-wrap{margin-top:15px;}
.dprog-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:5px;}
.dprog-track{height:9px;background:var(--border);border-radius:999px;overflow:hidden;}
.dprog-fill{height:100%;border-radius:999px;width:0%;transition:width 1.1s cubic-bezier(0,0,.2,1);}
.dprog-fill.on-track{background:var(--pos);}
.dprog-fill.at-risk,.dprog-fill.overdue{background:var(--neg);}
.dprog-fill.paused{background:var(--warn);}
.dprog-fill.completed{background:var(--info);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px;transition:background .35s;}
.dcard-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:11px;}
.ms-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.ms-row:last-child{border-bottom:none;}
.ms-name{font-size:12px;font-weight:500;}
.ms-due{font-size:10px;color:var(--text-3);}
.risk-block{padding:9px;border-radius:10px;margin-bottom:8px;}
.risk-block.danger{background:var(--neg-sub);border:1px solid rgba(255,107,107,.25);}
.risk-block.info{background:var(--info-sub);border:1px solid rgba(64,196,255,.25);}
.risk-block.muted{background:var(--surface-raised);border:1px solid var(--border);}
.risk-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.risk-block.danger .risk-tag{color:var(--neg);}
.risk-block.info .risk-tag{color:var(--info);}
.risk-block.muted .risk-tag{color:var(--text-3);}
.risk-text{font-size:11px;color:var(--text-2);}
.detail-actions{display:flex;justify-content:flex-end;gap:8px;}
/* project header injected before kpiGrid in detail mode */
#detailHdr{display:none;}
#detailHdr.on{display:block;animation:fadeUp .25s cubic-bezier(0,0,.2,1);}
/* project-mode KPI cards: non-interactive */
#kpiGrid.project-mode .kcard{cursor:default;}
#kpiGrid.project-mode .kcard:hover{transform:none;box-shadow:none;background:var(--surface);border-color:var(--border);}

/* ═══ AI PANEL ═══ */
.ai-panel{
  position:fixed;bottom:0;left:0;width:431px;height:560px;
  background:var(--surface);border:1px solid var(--accent);border-bottom:none;
  border-radius:14px 14px 0 0;display:flex;flex-direction:column;
  z-index:300;box-shadow:var(--shadow-lg);
  transform:translateY(100%);transition:transform .32s cubic-bezier(0,0,.2,1),background .35s;
}
.ai-panel.open{transform:translateY(0);}
.ai-phdr{
  padding:11px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.ai-ptitle{font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:7px;}
.ai-close{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:19px;line-height:1;padding:0;transition:color .15s;}
.ai-close:hover{color:var(--text-1);}
.ai-msgs{flex:1;overflow-y:auto;padding:11px 14px;display:flex;flex-direction:column;gap:8px;}
.amsg{max-width:90%;padding:7px 11px;border-radius:11px;font-size:11.5px;line-height:1.55;animation:fadeUp .2s cubic-bezier(0,0,.2,1);}
.amsg.u{align-self:flex-end;background:var(--accent-sub);color:var(--accent);border:1px solid rgba(180,255,84,.2);}
.amsg.a{align-self:flex-start;background:var(--surface-raised);color:var(--text-1);border:1px solid var(--border);}
/* AI quick options */
.ai-opts{
  padding:8px 14px 10px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;flex-shrink:0;
  transition:opacity .2s,max-height .25s;
}
.ai-opts-label{font-size:10.5px;color:var(--text-3);margin-bottom:1px;}
.ai-opt-btn{
  display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;
  background:var(--surface-raised);border:1px solid var(--border-strong);
  border-radius:8px;color:var(--text-2);font-size:12px;font-weight:500;
  cursor:pointer;text-align:left;
  transition:background .15s,color .15s,border-color .15s,transform .15s;
}
.ai-opt-btn:hover{background:var(--accent-sub);border-color:var(--accent);color:var(--accent);transform:translateX(2px);}
.ai-in-row{padding:8px 11px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0;}
.ai-in{
  flex:1;height:34px;padding:0 12px;background:var(--surface-raised);
  border:1px solid var(--border-strong);border-radius:999px;
  color:var(--text-1);font-size:12px;outline:none;transition:border-color .15s,background .35s;
}
.ai-in::placeholder{color:var(--text-3);}
.ai-in:focus{border-color:var(--accent);}
.ai-send{
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:opacity .15s,transform .2s cubic-bezier(.34,1.56,.64,1);
}
.ai-send:hover{opacity:.85;transform:scale(1.08);}
.typing{display:flex;gap:4px;padding:3px 0;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--text-3);animation:bounce 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){
  .sidebar{width:52px;padding-left:0;}
  .tab-row,.panel-hdr,.cards-list{display:none;}
  .ai-btn{margin:8px;border-radius:50%;width:36px;height:36px;}
  .ai-btn span{display:none;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .detail-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){

  .main{padding:12px 20px;}

  .header{padding:0 20px;}
  .breadcrumb{padding:0 20px;}
  .hrow .btn:not(.btn-accent){display:none;}
}
</style>

function toggleFMulti(e, field) {
  e.stopPropagation();
  const panelId = 'fp' + field.charAt(0).toUpperCase() + field.slice(1);
  const panel   = document.getElementById(panelId);
  const btn     = document.getElementById(FM_IDS[field] + '-btn');
  const isOpen  = panel.classList.contains('open');
  closeAllFMulti();
  if (!isOpen) {
    panel.classList.add('open');
    if (btn) btn.classList.add('open');
  }
}
function closeAllFMulti() {
  document.querySelectorAll('.fmulti-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.fmulti-btn').forEach(b => b.classList.remove('open'));
}
function onMultiChange(field, cb) {
  const val = cb.value;
  if (cb.checked) { if (!FS[field].includes(val)) FS[field].push(val); }
  else            { FS[field] = FS[field].filter(v => v !== val); }
  updateFMultiBtn(field);
  S.kpiSel = null;
  document.querySelectorAll('.kcard').forEach(c => c.classList.remove('selected'));
  updateFilterCount();
  renderTable();
}
function updateFMultiBtn(field) {
  const btn = document.getElementById(FM_IDS[field] + '-btn');
  if (!btn) return;
  const sel  = FS[field];
  const chev = `<svg class="fmulti-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if (sel.length === 0) {
    btn.innerHTML = `${FM_LABELS[field]} ${chev}`;
    btn.classList.remove('has-sel');
  } else if (sel.length === 1) {
    const short = sel[0].length > 15 ? sel[0].slice(0, 13) + '…' : sel[0];
    btn.innerHTML = `${short} ${chev}`;
    btn.classList.add('has-sel');
  } else {
    btn.innerHTML = `${FM_LABELS[field]} <span class="fmulti-badge">${sel.length}</span> ${chev}`;
    btn.classList.add('has-sel');
  }
}

    if (!panel) return;
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {

}

          </div>
          <div class="ktarget">Target: ${kpi.target}</div>
        </div>
        <div class="kchart"><canvas id="ch-${kpi.id}"></canvas></div>
      </div>`;
    grid.appendChild(card);
  });

  requestAnimationFrame(() => KPIS.forEach(k => buildChart(k)));
}

function buildChart(kpi) {
  const canvas = document.getElementById('ch-' + kpi.id);
  if (!canvas) return;
  if (charts[kpi.id]) { charts[kpi.id].destroy(); }
  const col  = getCol(kpi);
  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 72);
  grad.addColorStop(0, col + '45');
  grad.addColorStop(1, col + '00');

  const isDark = S.theme === 'dark';
  const axisColor = isDark ? 'rgba(120,152,152,0.4)' : 'rgba(82,116,116,0.4)';
  const minVal = Math.min(...kpi.spark);
  const maxVal = Math.max(...kpi.spark);
  const yPad  = Math.max((maxVal - minVal) * 0.4, 1);

  charts[kpi.id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Q1','Q2','Q3','Q4'],
      datasets: [{
        data: kpi.spark,
        borderColor: col, borderWidth: 1.8,
        backgroundColor: grad, fill: true,
        tension: 0.35,
        cubicInterpolationMode: 'monotone',
        pointRadius: 0, pointHoverRadius: 4,
        pointHoverBackgroundColor: col,
        pointHoverBorderColor: isDark ? '#041A1C' : '#fff',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: {
        duration: 800, easing: 'easeOutQuart',
        delay: ctx => ctx.dataIndex * 60,
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: true, mode: 'index', intersect: false,
          backgroundColor: isDark ? '#062424' : '#fff',
          borderColor: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)',
          borderWidth: 1,
          titleColor: isDark ? '#A2BCBC' : '#527474',
          bodyColor: isDark ? '#fff' : '#011314',
          bodyFont: { family: 'DM Mono', size: 11 },
          padding: 8, cornerRadius: 8,
          callbacks: {
            title: items => 'Q' + (items[0].dataIndex + 1),
            label: c => ` ${kpi.label}: ${c.raw}${kpi.unit}`,
          }
        }
      },
      scales: {
        x: {
          display: true,
          ticks: {
            font: { size: 9, family: "'DM Mono', monospace" },
            color: axisColor,
            maxRotation: 0,
            padding: 2,
          },
          grid:   { display: false },
          border: { display: false },
        },
        y: { display: false, min: minVal - yPad, max: maxVal + yPad }
      },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

function toggleKpiFilter(kpi) {
  if (S.detail) return; // KPI filter is a no-op in project detail view
  if (S.kpiSel === kpi.id) {
    S.kpiSel = null;
    document.getElementById('kc-' + kpi.id).classList.remove('selected');
  } else {
    document.querySelectorAll('.kcard').forEach(c => c.classList.remove('selected'));
    S.kpiSel = kpi.id;
    document.getElementById('kc-' + kpi.id).classList.add('selected');
  }
  renderTable();
}

function switchTab(tab) {
  S.tab = tab;
  document.getElementById('tabCrit').className = 'tab-btn crit' + (tab==='critical'?' on':'');
  document.getElementById('tabUpco').className = 'tab-btn upco' + (tab==='upcoming'?' on':'');
  document.getElementById('panelTitle').textContent = tab==='critical' ? "What's Critical" : 'Upcoming';
  renderCards(tab==='critical' ? CRITICAL : UPCOMING);
}

function renderCards(items) {
  // Sort: critical tab → overdue first (negative daysLeft), then ascending daysLeft
  //       upcoming tab → ascending daysLeft (soonest first)
  const sorted = S.tab === 'critical'
    ? [...items].sort((a, b) => {
        const aOver = (a.daysLeft ?? 0) < 0 ? 0 : 1;
        const bOver = (b.daysLeft ?? 0) < 0 ? 0 : 1;
        if (aOver !== bOver) return aOver - bOver;
        return (a.daysLeft ?? 0) - (b.daysLeft ?? 0);
      })
    : [...items].sort((a, b) => (a.daysLeft ?? 0) - (b.daysLeft ?? 0));

  const el = document.getElementById('cardsList');
  el.innerHTML = '';
  sorted.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'ccard';
    card.style.animationDelay = (0.04 + i * 0.06) + 's';

    const dl       = item.daysLeft ?? 0;
    const overdue  = dl < 0;
    const urgent   = dl >= 0 && dl <= 30;
    const dbCls    = (overdue || urgent) ? 'daysbadge red' : 'daysbadge amber';
    const daysNum  = Math.abs(dl);
    const daysLbl  = overdue ? 'Days past' : 'Days left';

    const avatarSrc = LEAD_AVATARS[item.contact || item.lead] || '';
    const avatarEl  = avatarSrc
      ? `<img class="avatar" src="${avatarSrc}" alt="" onerror="this.style.display='none'">`
      : '';

    if (item.type === 'project') {
      card.innerHTML = `
        <div class="cbody">
          <span class="cbadge bp">Projects</span>
          <div class="ctitle">${item.name}</div>
          <div class="cmeta">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" style="display:inline;vertical-align:middle;margin-right:2px;"><rect x=".5" y="1" width="8" height="7" rx=".8" stroke="currentColor" stroke-width="1"/><path d="M2.5.5v1M6.5.5v1M.5 3.5h8" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
            ${fd(item.start)} → ${fd(item.end)}
          </div>
          <div class="cmeta">Status: <strong style="color:${stColor(item.status)}">${item.status}</strong></div>
          <div class="cmeta-lead">${avatarEl}${item.contact} · ${fd(item.cDate)}</div>
          <div class="creason">⚠ ${item.reason}</div>
        </div>
        <div class="${dbCls}"><div class="dnum">${daysNum}</div><div class="dlbl">${daysLbl}</div></div>`;
      card.onclick = () => openDetail(PORTFOLIOS.find(p => p.id === item.id));
    } else {
      card.innerHTML = `
        <div class="cbody">
          <span class="cbadge bc">Compliance</span>
          <div class="ctitle">${item.name}</div>
          <div class="cmeta">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" style="display:inline;vertical-align:middle;margin-right:2px;"><rect x=".5" y="1" width="8" height="7" rx=".8" stroke="currentColor" stroke-width="1"/><path d="M2.5.5v1M6.5.5v1M.5 3.5h8" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
            ${fd(item.start)} → ${fd(item.end)}
          </div>
          <div class="cmeta-lead">${avatarEl}${item.lead ?? item.contact}</div>
        </div>
        <div class="${dbCls}"><div class="dnum">${daysNum}</div><div class="dlbl">${daysLbl}</div></div>`;
    }
    el.appendChild(card);
  });
}

function getFiltered() {
  let data = PORTFOLIOS;
  if (FS.region.length)  data = data.filter(p => FS.region.includes(p.region));
  if (FS.country.length) data = data.filter(p => FS.country.includes(p.country));
  if (FS.lead.length)    data = data.filter(p => FS.lead.includes(p.lead));
  if (FS.status.length)  data = data.filter(p => FS.status.includes(p.status));
  if (FS.project.length) data = data.filter(p => FS.project.some(pn => p.name.includes(pn)));
  if (S.search) {
    const q = S.search;
    data = data.filter(p => [p.name,p.country,p.lead,p.notes].some(x => x.toLowerCase().includes(q)));
  }
  if (S.kpiSel) {
    const kpi = KPIS.find(k => k.id === S.kpiSel);
    if (kpi) {
      if (kpi.id === 'active') {
        data = data.filter(p => p.status==='on-track' || p.status==='at-risk');
      } else if (kpi.filterStatus) {
        data = data.filter(p => p.status === kpi.filterStatus);
      }
    }
  }
  return data;
}

function renderTable() {
  let data = getFiltered();
  data = [...data].sort((a,b) => {
    const [va,vb] = [a[S.sortCol], b[S.sortCol]];
    const r = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
    return S.sortAsc ? r : -r;
  });
  document.getElementById('ptCount').textContent = data.length;
  const tbody = document.getElementById('ptBody');
  tbody.innerHTML = '';
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="opacity:.3"><rect x="3" y="3" width="22" height="22" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M9 9h10M9 14h6M9 19h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>No portfolios match the current filters</div></td></tr>';
    return;
  }
  data.forEach((p, i) => {
    const tr = document.createElement('tr');
    const avatarSrc = LEAD_AVATARS[p.lead] || '';
    const avatarEl  = avatarSrc
      ? `<img class="avatar" src="${avatarSrc}" alt="${p.lead}" onerror="this.style.display='none'">`
      : '';
    tr.innerHTML = `
      <td class="tdn">${p.name}</td>
      <td class="tdc">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="display:inline;vertical-align:middle;margin-right:3px;opacity:.5"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1"/><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><ellipse cx="5.5" cy="5.5" rx="2.5" ry="4.5" stroke="currentColor" stroke-width="1"/></svg>
        ${p.country}
      </td>
      <td><div class="tdl-cell">${avatarEl}<span>${p.lead}</span></div></td>
      <td><span class="chip ${p.status}">${fStatus(p.status)}</span></td>
      <td>
        <div class="prog-cell">
          <div class="prog-track"><div class="prog-fill ${p.status}" id="pf-${p.id}"></div></div>
          <div class="prog-pct">${p.progress}%</div>
        </div>
      </td>
      <td class="tdd">${fd(p.deadline)}</td>
      <td class="tdn-notes" title="${p.notes}">${p.notes}</td>`;
    tr.onclick = () => openDetail(p);
    tbody.appendChild(tr);
    requestAnimationFrame(() => {
      setTimeout(() => {
        const el = document.getElementById('pf-' + p.id);
        if (el) el.style.width = p.progress + '%';
      }, 60 + i * 20);
    });
  });
  // sort icons
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sa','sd');
    const si = th.querySelector('.si');
    if (!si) return;
    if (th.dataset.c === S.sortCol) {
      th.classList.add(S.sortAsc ? 'sa' : 'sd');
      si.textContent = S.sortAsc ? '↑' : '↓';
    } else si.textContent = '↕';
  });
}

function doSort(col) {
  S.sortAsc = S.sortCol === col ? !S.sortAsc : true;
  S.sortCol = col;
  renderTable();
}
function onSearch() {
  S.search = document.getElementById('srch').value.toLowerCase().trim();
  renderTable();
}
function clearFilters() {
  Object.keys(FS).forEach(k => FS[k] = []);
  document.querySelectorAll('.fmulti-panel input[type="checkbox"]').forEach(cb => cb.checked = false);
  Object.keys(FS).forEach(f => updateFMultiBtn(f));
  const srch = document.getElementById('srch');
  if (srch) srch.value = '';
  S.search = ''; S.kpiSel = null;
  document.querySelectorAll('.kcard').forEach(c => c.classList.remove('selected'));

function updateFilterCount() {
  const n = Object.values(FS).filter(arr => arr.length > 0).length;
  document.getElementById('fCount').textContent = n ? `${n} filter${n>1?'s':''} active` : '';
  const resetBtn = document.getElementById('resetBtn');

}

/* ═══════════════════════════════════════════════════
   PROJECT-LEVEL KPIs
═══════════════════════════════════════════════════ */
function getProjectKPIs(p) {
  const today    = new Date('2025-06-15T00:00:00');
  const deadline = new Date(p.deadline + 'T00:00:00');
  const daysLeft = Math.max(0, Math.round((deadline - today) / 86400000));

  const msDone      = p.progress >= 75 ? 4 : p.progress >= 50 ? 3 : p.progress >= 30 ? 2 : 1;
  const compScore   = { 'on-track':87, 'at-risk':54, 'overdue':31, 'paused':62 }[p.status] || 70;
  const budgetUtil  = Math.min(100, Math.max(0, p.progress + (p.id % 7) - 3));
  const riskScore   = { 'on-track':18, 'at-risk':65, 'overdue':82, 'paused':40 }[p.status] || 50;
  const pr = p.progress;

  return [
    { id:'pj-progress',    label:'Overall Progress',    val:pr,
      disp:String(pr),          unit:'%',
      color: pr>=70?'pos':pr>=40?'warn':'neg',
      spark: [Math.round(pr*.3), Math.round(pr*.55), Math.round(pr*.82), pr],
      trend:'up', dir:'pos',
      delta:`+${Math.round(pr*.18)}% this qtr`, target:'100%' },

    { id:'pj-days',        label:'Days Remaining',      val:daysLeft,
      disp:String(daysLeft),    unit:'d',
      color: daysLeft<30?'neg':daysLeft<60?'warn':'neu',
      spark: [daysLeft+90, daysLeft+60, daysLeft+30, daysLeft],
      trend:'down', dir: daysLeft<30?'neg':daysLeft<60?'warn':'neu',
      delta:'until deadline', target:'—' },

    { id:'pj-milestones',  label:'Milestones Done',     val:msDone,
      disp:String(msDone),      unit:'/4',
      color: msDone>=3?'pos':msDone>=2?'warn':'neg',
      spark: [Math.max(0,msDone-3), Math.max(0,msDone-2), Math.max(0,msDone-1), msDone],
      trend:'up', dir:'pos',
      delta:`${4-msDone} remaining`, target:'4' },

    { id:'pj-compliance',  label:'Compliance Score',    val:compScore,
      disp:String(compScore),   unit:'%',
      color: compScore>=75?'pos':compScore>=50?'warn':'neg',
      spark: [compScore-15, compScore-8, compScore-3, compScore],
      trend:'up', dir:'pos',
      delta:'+5% this qtr', target:'90%' },

    { id:'pj-budget',      label:'Budget Utilization',  val:budgetUtil,
      disp:String(budgetUtil),  unit:'%',
      color: Math.abs(budgetUtil-pr)<12?'pos':'warn',
      spark: [Math.round(budgetUtil*.3), Math.round(budgetUtil*.55), Math.round(budgetUtil*.8), budgetUtil],
      trend:'up', dir:'pos',
      delta:'vs plan', target:'≤105%' },

    { id:'pj-risk',        label:'Risk Score',          val:riskScore,
      disp:String(riskScore),   unit:'',
      color: riskScore<30?'pos':riskScore<60?'warn':'neg',
      spark: [Math.max(0,riskScore-12), Math.max(0,riskScore-6), riskScore, Math.min(100,riskScore+3)],
      trend: riskScore>50?'up':'flat',
      dir:   riskScore>60?'neg':riskScore>30?'warn':'pos',
      delta: riskScore>60?'High risk':riskScore>30?'Moderate':'Low risk', target:'<30' },
  ];
}

/* ═══════════════════════════════════════════════════
   DETAIL VIEW
═══════════════════════════════════════════════════ */
function openDetail(p) {
  if (!p) return;
  S.detail = p;
  document.getElementById('bc').classList.add('on');
  document.getElementById('bcLabel').textContent = p.name;
  document.getElementById('dashView').style.display = 'none';

  // ── 1. Project header (shown above kpiGrid) ──
  const dHdr = document.getElementById('detailHdr');
  dHdr.classList.add('on');

  const avatarSrc = LEAD_AVATARS[p.lead] || '';
  const avatarEl  = avatarSrc
    ? `<img class="avatar avatar-lg" src="${avatarSrc}" alt="${p.lead}" style="border:2px solid var(--border-strong);" onerror="this.style.display='none'">`
    : '';

  dHdr.innerHTML = `
    <div class="dhdr">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div>
          <span class="cbadge bp" style="margin-bottom:7px;">Portfolio</span>
          <div class="dtitle">${p.name}</div>
          <div class="dsubtitle">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="display:inline;vertical-align:middle;margin-right:3px;opacity:.5"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1"/><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><ellipse cx="5.5" cy="5.5" rx="2.5" ry="4.5" stroke="currentColor" stroke-width="1"/></svg>
            ${p.country} · ${p.region}
          </div>
        </div>
        <span class="chip ${p.status}" style="font-size:12px;padding:4px 12px;height:auto;">${fStatus(p.status)}</span>
      </div>
      <div class="dmeta-row">
        <div class="dmi">
          <div class="dmlbl">Lead</div>
          <div class="dmval" style="display:flex;align-items:center;gap:7px;">${avatarEl}${p.lead}</div>
        </div>
        <div class="dmi"><div class="dmlbl">Deadline</div><div class="dmval">${fd(p.deadline)}</div></div>
        <div class="dmi"><div class="dmlbl">Progress</div><div class="dmval" style="font-family:'DM Mono',monospace;">${p.progress}%</div></div>
        <div class="dmi"><div class="dmlbl">Region</div><div class="dmval">${p.region}</div></div>
      </div>
      <div class="dprog-wrap">
        <div class="dprog-lbl">Overall Progress</div>
        <div class="dprog-track"><div class="dprog-fill ${p.status}" id="dpf"></div></div>
      </div>
    </div>`;

  // ── 2. Project-level KPIs in the shared kpiGrid ──
  KPIS = getProjectKPIs(p);
  document.getElementById('kpiGrid').classList.add('project-mode');
  renderKPIs();

  // Animate progress bar after paint
  setTimeout(() => {
    const el = document.getElementById('dpf');
    if (el) el.style.width = p.progress + '%';
  }, 200);

  // ── 3. Detail view: compliance milestones (date-based, newest first) + risk ──
  const TODAY = new Date('2026-05-22T00:00:00');
  function msDate(dl, offsetMonths) {
    const d = new Date(dl + 'T00:00:00');
    d.setMonth(d.getMonth() + offsetMonths);
    return d.toISOString().slice(0, 10);
  }
  function msStatus(dueStr, passStatus) {
    return new Date(dueStr + 'T00:00:00') < TODAY
      ? (p.progress > 55 ? 'completed' : 'overdue')
      : passStatus;
  }
  const milestones = [
    { name:'Environmental Impact Assessment', due: msDate(p.deadline, -12),
      status: msStatus(msDate(p.deadline,-12), p.progress>40?'on-track':'at-risk') },
    { name:'Procurement Plan Submission',     due: msDate(p.deadline, -8),
      status: msStatus(msDate(p.deadline,-8),  p.status==='at-risk'?'at-risk':'on-track') },
    { name:'Mid-term Review',                 due: msDate(p.deadline, -4),
      status: msStatus(msDate(p.deadline,-4),  p.progress>55?'on-track':'at-risk') },
    { name:'Final Disbursement Approval',     due: p.deadline,
      status: p.status==='overdue'?'overdue':p.progress>80?'on-track':'at-risk' },
  ];
  // Newest due date first
  milestones.sort((a, b) => new Date(b.due) - new Date(a.due));

  const dv = document.getElementById('detailView');
  dv.classList.add('on');
  dv.innerHTML = `
    <div class="dcard">
      <div class="dcard-title">Compliance Milestones</div>
      ${milestones.map(m => `
        <div class="ms-row">
          <div>
            <div class="ms-name">${m.name}</div>
            <div class="ms-due">Due: ${fd(m.due)}</div>
          </div>
          <span class="chip ${m.status}" style="font-size:10px;">${fStatus(m.status)}</span>
        </div>`).join('')}
    </div>
    <div class="dcard">
      <div class="dcard-title">Risk &amp; Action Log</div>
      <div class="risk-block danger">
        <div class="risk-tag">Risk</div>
        <div class="risk-text">${p.notes}</div>
      </div>
      <div class="risk-block info">
        <div class="risk-tag">Suggested Action</div>
        <div class="risk-text">Schedule review with ${p.lead} and procurement team. Consider requesting a 60-day extension if delays persist.</div>
      </div>
      <div class="risk-block muted">
        <div class="risk-tag">Last Update</div>
        <div class="risk-text">Status reviewed by ${p.lead} — May 2025</div>
      </div>
    </div>
    <div class="detail-actions">
      <button class="btn" onclick="backToDash()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M7 2L3 5.5 7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </button>
      <button class="btn btn-accent" onclick="doExport(this)">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3.5 6.5l2.5 2.5 2.5-2.5M1 9.5v1A.5.5 0 001.5 11h9a.5.5 0 00.5-.5v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Export Report
      </button>
    </div>`;
}

function backToDash() {
  S.detail = null;
  document.getElementById('bc').classList.remove('on');

  // Hide and clear project header
  const dHdr = document.getElementById('detailHdr');
  dHdr.classList.remove('on');

  document.getElementById('kpiGrid').classList.remove('project-mode');

  // Show dashboard

  dv.style.display = 'flex';
  dv.style.flexDirection = 'column';
  dv.style.gap = '12px';

  dtv.classList.remove('on');
  dtv.innerHTML = '';
}

function aiSelectOption(option) {
  // Hide options
  const opts = document.getElementById('aiOpts');
  if (opts) { opts.style.opacity = '0'; setTimeout(() => opts.style.display = 'none', 200); }
  // Send message
  addMsg(option, 'u');
  const typing = addTyping();
  const delay = 800 + Math.random() * 600;
  setTimeout(() => {
    typing.remove();
    let resp;
    if (option === 'Project retrospection') {
      const overdueP = PORTFOLIOS.filter(p => p.status==='overdue').map(p => p.name).join(', ');
      const onTrackP = PORTFOLIOS.filter(p => p.status==='on-track').slice(0,2).map(p => p.name).join(', ');
      resp = `**Portfolio Retrospection — YTD 2025**\n\n✅ **On track:** ${onTrackP} and ${ONTRACK_COUNT - 2} others showing consistent progress.\n\n⚠️ **At risk:** Procurement delays (Kenya) and monsoon disruption (India) are repeat blockers from Q1.\n\n❌ **Overdue:** ${overdueP} — both have outstanding compliance dependencies.\n\n📌 **Lesson learned:** EIA timelines need 4-week buffers. Consider escalation triggers at 60% deadline milestone.`;
    } else if (option === 'Project details') {
      if (S.detail) {
        resp = `**${S.detail.name}**\n\nProgress: **${S.detail.progress}%** · Status: **${fStatus(S.detail.status)}**\nLead: ${S.detail.lead} · Deadline: ${fd(S.detail.deadline)}\n\n${S.detail.notes}\n\nWould you like compliance milestones, risk analysis, or disbursement forecast?`;
      } else {
        const names = PORTFOLIOS.slice(0,4).map(p => `• ${p.name}`).join('\n');
        resp = `Which project would you like to explore?\n\n${names}\n• …and ${PORTFOLIOS.length - 4} more\n\nClick a project row in the table to open it, or type a project name.`;
      }
    }
    addMsg(resp, 'a');
  }, delay);
}

function aiKey(e) { if (e.key === 'Enter') aiSend(); }

function aiSend() {
  const inp = document.getElementById('aiIn');
  const txt = inp.value.trim();
  if (!txt) return;
  // Hide options once user types
  const opts = document.getElementById('aiOpts');
  if (opts) { opts.style.opacity = '0'; setTimeout(() => opts.style.display = 'none', 200); }

  addMsg(txt, 'u');
  inp.value = '';
  const typing = addTyping();
  const delay = 900 + Math.random() * 700;
  setTimeout(() => {
    typing.remove();
    const q = txt.toLowerCase();
    let resp = AI_KB.default;
    for (const [k, r] of Object.entries(AI_KB)) {
      if (!r || k === 'default') continue;
      if (q.includes(k)) { resp = r; break; }
    }
    // Inject dynamic counts
    resp = resp
      .replace('{overdue}', OVERDUE_COUNT)
      .replace('{atRisk}',  ATRISK_COUNT)
      .replace('{paused}',  PAUSED_COUNT);
    // Context-aware if project is open
    if (resp === AI_KB.default && S.detail) {
      resp = `**${S.detail.name}**: ${S.detail.progress}% progress. ${S.detail.notes}. Lead: ${S.detail.lead}.`;
    }
    addMsg(resp, 'a');
  }, delay);
}

function addMsg(txt, role) {
  const msgs = document.getElementById('aiMsgs');
  const el = document.createElement('div');
  el.className = 'amsg ' + role;
  el.innerHTML = txt
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}
function addTyping() {
  const msgs = document.getElementById('aiMsgs');
  const el = document.createElement('div');
  el.className = 'amsg a';
  el.innerHTML = '<div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

/* ═══════════════════════════════════════════════════
   LIVE UPDATE
═══════════════════════════════════════════════════ */
function liveUpdate() {
  const kpi = KPIS.find(k => k.id === 'overdue');
  if (!kpi) return setTimeout(liveUpdate, 25000);
  const newVal = kpi.val + 1;
  kpi.val = newVal;
  kpi.disp = String(newVal).padStart(2, '0');
  kpi.spark = [...kpi.spark.slice(1), newVal];
  kpi.delta = kpi.delta.replace(/^[+\-]\d+/, `+${newVal - (newVal - 1) + 1}`);

  const numEl = document.getElementById('knum-overdue');
  if (numEl) {
    numEl.classList.add('flash');
    numEl.textContent = kpi.disp + kpi.unit;
    setTimeout(() => numEl.classList.remove('flash'), 600);
  }
  buildChart(kpi);
  setTimeout(liveUpdate, 28000);
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function v(id) { return document.getElementById(id)?.value || ''; }
function fd(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
}
function fStatus(s) {
  return { 'on-track':'On Track','at-risk':'At Risk','overdue':'Overdue','paused':'Paused','completed':'Completed' }[s] || s;
}
function stColor(s) {
  return { 'At Risk':'var(--neg)','Overdue':'var(--neg)','On Track':'var(--pos)','Paused':'var(--warn)' }[s] || 'var(--text-2)';
}
function doExport(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Preparing…';
  btn.disabled = true;
  setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2200);
}
